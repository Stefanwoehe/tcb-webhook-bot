services:
  - type: web
    name: tcb-webhook-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_SECRET_KEY
        sync: false
      - key: BITGET_PASSPHRASE
        sync: false
      - key: RR_RATIO
        value: "0.5"
      - key: ORDER_SIZE_USDT
        value: "100"
